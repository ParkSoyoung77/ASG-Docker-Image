name: Auto-Scaling-Instance-Deployment-Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 1. S3 버킷 업데이트
      - name: Upload Config and Assets to S3
        run: |
          aws s3 cp ./default.conf s3://${{ secrets.S3_BUCKET_NAME }}/conf.d/default.conf
          aws s3 sync ./html/ s3://${{ secrets.S3_BUCKET_NAME }}/html/ --delete

      # 2. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. Docker 이미지 빌드 및 SHA 태그 푸시
      - name: Build and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 4. SSM을 통해 SHA 태그 기반으로 배포
      - name: Deploy to Ec2 using SSM
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Namespace,Values=st7-asg" \
            --parameters '{
                "commands": [
                  "sudo mkdir -p /home/ec2-user/nginx/html",
                  "sudo mkdir -p /home/ec2-user/nginx/conf.d",
                  "sudo chown -R ec2-user:ec2-user /home/ec2-user/nginx",
                  "sudo chmod 666 /home/ec2-user/nginx/html/index.html"
                  "aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/conf.d/default.conf /home/ec2-user/nginx/conf.d/default.conf",
                  "aws s3 sync s3://${{ secrets.S3_BUCKET_NAME }}/html/ /home/ec2-user/nginx/html/ --delete",
                  "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | sudo docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}",
                  "sudo docker pull ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}",
                  "sudo docker stop nginx-container || true",
                  "sudo docker rm nginx-container || true",
                  "sudo docker run -d --name nginx-container -p 80:80 -v /home/ec2-user/nginx/html:/usr/share/nginx/html -v /home/ec2-user/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}",
                  "sudo docker image prune -a -f"
                ]
              }' \
            --region ${{ secrets.AWS_REGION }} \
            --comment "Deploying with SHA tag: ${{ github.sha }}"