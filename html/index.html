<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD 배포 테스트</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .status-badge {
            background-color: #28a745;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 1rem;
        }
        h1 { color: #1a73e8; margin-bottom: 0.5rem; }
        p { color: #5f6368; }
        .info {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #9aa0a6;
            border-top: 1px solid #eee;
            padding-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge">Successfully Deployed</div>
        <h1>CI/CD Pipeline Test + Git</h1>
        <p>인스턴스 및 컨테이너 배포가 정상적으로 완료되었습니다.</p>
        
        <div class="info">
            <p><strong>Git Actions</strong>을 활용한 도커 컨테이너 배포 완료!</p>
            <p><strong>Deployment Time:</strong> <span id="time"></span></p>
        </div>
    </div>

    <script>
        // 현재 시간을 표시하여 배포 갱신 여부 확인 용도
        document.getElementById('time').innerText = new Date().toLocaleString();
    </script>
</body>
</html>
